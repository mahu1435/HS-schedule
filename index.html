<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>コンクリート製品段取り管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --accent: #059669;
            --warning: #d97706;
            --danger: #dc2626;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        /* login-overlay */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f172a;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }

        .login-box {
            background: #1e293b;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 24px;
            font-size: 1.5rem;
            font-weight: 800;
        }

        .login-input {
            width: 100%;
            padding: 14px;
            background: #334155;
            border: 2px solid #475569;
            border-radius: 8px;
            color: white;
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 0.5em;
            margin-bottom: 20px;
            outline: none;
        }

        .login-input:focus {
            border-color: var(--primary);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }

        .login-btn:hover {
            background: var(--primary-hover);
        }

        .login-error {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 12px;
            font-weight: 600;
        }

        .sync-badge {
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 10px;
            background: #e2e8f0;
            color: #64748b;
            font-weight: 700;
            margin-left: auto;
        }

        .sync-badge.online {
            background: #dcfce7;
            color: #15803d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .dashboard-header {
            background: #ffffff;
            border-bottom: 1px solid var(--border-color);
            padding: 12px 16px 16px;
            z-index: 10;
            box-shadow: var(--shadow-sm);
        }

        .top-date-banner {
            text-align: center;
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--text-secondary);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px dashed var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .top-date-banner::before {
            content: '📅';
            font-size: 0.9rem;
        }

        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            /* Updated to 4 columns */
            gap: 12px;
            margin-bottom: 16px;
        }

        .status-item {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }

        .status-item.action-btn {
            cursor: pointer;
            justify-content: center;
            align-items: center;
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            transition: background 0.2s;
        }

        .status-item.action-btn:active {
            background: var(--primary-hover);
        }

        .status-item label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .status-item input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1.25rem;
            font-weight: 800;
            width: 100%;
            outline: none;
        }

        .status-item .btn-icon {
            font-weight: 700;
            font-size: 0.9rem;
        }

        .summary-section {
            margin-bottom: 4px;
        }

        .summary-info {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
        }

        .summary-item .label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .summary-item .value {
            font-size: 1.5rem;
            font-weight: 800;
            margin-left: 4px;
            color: var(--primary);
        }

        .gauge-container {
            width: 100%;
            height: 12px;
            background: #e2e8f0;
            border-radius: 6px;
            overflow: hidden;
        }

        .gauge-fill {
            height: 100%;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        .gauge-fill.goal-reached {
            background: var(--accent);
        }

        /* Product Card Added State */
        .product-card.added {
            opacity: 0.6;
            background: #f1f5f9;
            pointer-events: none;
        }

        .added-badge {
            background: #dcfce7;
            color: #15803d;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 800;
            border: 1px solid #86efac;
        }

        .form-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 8px 0;
        }

        .form-checkbox input {
            width: 18px;
            height: 18px;
        }

        .tracking-fields {
            padding: 12px;
            background: #f8fafc;
            border-radius: 8px;
            border: 1px dashed var(--border-color);
            margin-top: 8px;
        }

        .hidden-tracking {
            display: none !important;
        }

        /* Lists */
        .lists-container {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 8px;
            gap: 8px;
        }

        .list-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
        }

        .list-wrapper.expanded {
            flex: 100;
            z-index: 5;
        }

        .list-wrapper.shrunk {
            flex: 0;
            min-height: 0;
            overflow: hidden;
            border: none;
            padding: 0;
            margin: 0;
            opacity: 0;
            pointer-events: none;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-icon-only {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .btn-icon-only:hover {
            background: var(--bg-color);
            color: var(--primary);
        }

        .btn-icon-only.active {
            color: var(--primary);
            background: #e0e7ff;
        }

        .section-title {
            font-size: 0.95rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            background: var(--bg-color);
            color: var(--text-secondary);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid var(--border-color);
        }

        .btn-text {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--primary);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
        }

        .card-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Cards */
        .product-card {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-left: 4px solid #cbd5e1;
            /* Neutral grey to reduce eye strain */
            border-radius: 6px;
            padding: 6px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .product-card:active {
            transform: scale(0.98);
        }

        .card-main {
            flex: 1;
        }

        .product-name {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 2px;
            color: var(--text-primary);
            line-height: 1.2;
        }

        .card-meta {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .stock-tag {
            font-size: 0.7rem;
            background: #f8fafc;
            border: 1px solid var(--border-color);
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .stock-tag.low {
            background: #fffbeb;
            color: var(--warning);
            border-color: #fef3c7;
        }

        .stock-tag.danger {
            background: #fef2f2;
            color: var(--danger);
            border-color: #fee2e2;
        }

        .priority-tag {
            font-size: 0.6rem;
            padding: 1px 4px;
            border-radius: 3px;
            font-weight: 800;
            margin-right: 4px;
            display: inline-block;
            vertical-align: middle;
        }

        .priority-high {
            background: #fee2e2;
            color: #b91c1c;
        }

        .priority-medium {
            background: #fef3c7;
            color: #b45309;
        }

        .priority-low {
            background: #dcfce7;
            color: #15803d;
        }

        .card-side {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
        }

        .product-weight {
            font-weight: 800;
            font-size: 1rem;
            color: var(--primary);
        }

        .rebar-info {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .action-icon {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-secondary);
            background: #f8fafc;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-icon:hover {
            background: white;
            border-color: var(--primary);
            color: var(--primary);
        }

        .action-icon.delete:hover {
            border-color: var(--danger);
            color: var(--danger);
            background: #fef2f2;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f8fafc;
            padding: 4px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .qty-btn {
            background: white;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            width: 28px;
            height: 28px;
            border-radius: 4px;
            font-weight: 800;
            font-size: 1rem;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
        }

        .btn-return {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-secondary);
            background: white;
            border: 1px solid var(--border-color);
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Modals */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        #edit-modal {
            z-index: 200;
            /* Higher than candidate modal */
        }

        .hidden {
            display: none !important;
        }

        .modal-content {
            background: #f0f7ff;
            border-radius: 12px;
            width: 100%;
            max-width: 440px;
            padding: 24px;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        .modal-content h3 {
            margin-bottom: 20px;
            font-weight: 800;
            color: var(--text-primary);
        }

        .form-grid {
            display: grid;
            gap: 16px;
            margin-bottom: 24px;
        }

        .form-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-item label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-secondary);
        }

        .form-item input,
        .form-item select,
        .form-item textarea {
            background: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            padding: 10px;
            font-size: 1rem;
            outline-color: var(--primary);
        }

        textarea#import-area {
            min-height: 120px;
            font-family: monospace;
            font-size: 0.85rem;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            flex: 2;
            cursor: pointer;
        }

        .btn-secondary {
            background: white;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            flex: 1;
            cursor: pointer;
        }

        /* Alerts */
        .alert-overlay {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            animation: slideDown 0.3s ease-out;
        }

        .alert-box {
            background: var(--danger);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 800;
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        @keyframes slideDown {
            from {
                transform: translate(-50%, -100%);
                opacity: 0;
            }

            to {
                transform: translate(-50%, 0);
                opacity: 1;
            }
        }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            padding: 40px 0;
        }

        /* FAB (Floating Action Button) */
        .fab-add {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 64px;
            height: 64px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
            cursor: pointer;
            z-index: 50;
            border: none;
            transition: transform 0.2s, background 0.2s;
        }

        .fab-add:active {
            transform: scale(0.9);
            background: var(--primary-hover);
        }

        /* Modal Overrides for Candidate List */
        .modal-full {
            padding: 0;
        }

        .modal-full .modal-content {
            width: 100%;
            height: 100%;
            max-width: none;
            border-radius: 0;
            display: flex;
            flex-direction: column;
            padding: 0;
        }

        .modal-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        #candidate-list-modal {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .search-container {
            padding: 8px 16px;
            background: #f8fafc;
            border-bottom: 1px solid var(--border-color);
        }

        #search-input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
        }

        #history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            font-size: 0.85rem;
        }

        #history-table th,
        #history-table td {
            border: 1px solid var(--border-color);
            padding: 8px;
            text-align: left;
        }

        #history-table th {
            background: #f8fafc;
            font-weight: 800;
        }

        .stats-summary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: #eff6ff;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #bfdbfe;
        }

        .stat-card label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            color: #1e40af;
            margin-bottom: 4px;
        }

        .stat-card .value {
            font-size: 1.25rem;
            font-weight: 900;
            color: #1e3a8a;
        }

        .stock-warning {
            color: var(--danger);
            font-weight: 800;
            font-size: 0.75rem;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stock-warning::before {
            content: '⚠️';
        }

        /* Calendar Styles */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background: var(--border-color);
            border: 1px solid var(--border-color);
            margin-bottom: 24px;
        }

        .calendar-day {
            background: white;
            min-height: 50px;
            padding: 4px;
            position: relative;
        }

        .calendar-header-day {
            background: #f1f5f9;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 8px 0;
        }

        .calendar-day.weekend {
            background: #fef2f2;
        }

        .day-num {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-secondary);
        }

        .month-header {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--primary);
            margin: 20px 0 10px;
            padding-left: 8px;
            border-left: 4px solid var(--primary);
        }

        .calendar-bar {
            height: 18px;
            color: white;
            font-size: 0.65rem;
            margin-top: 2px;
            padding: 0 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 5;
            width: calc(100% + 2px);
            margin-left: -1px;
            font-weight: 900;
            text-shadow: 0 1px 1px rgba(0, 0, 0, 0.3);
            /* Reset any padding/margin that might cause wrapping */
            box-sizing: border-box;
        }

        .calendar-bar.start-day {
            border-top-left-radius: 4px;
            border-bottom-left-radius: 4px;
            margin-left: 0;
            width: 100%;
        }

        .calendar-bar.end-day {
            clip-path: polygon(0% 0%, calc(100% - 8px) 0%, 100% 50%, calc(100% - 8px) 100%, 0% 100%);
            padding-right: 10px;
            width: 100%;
        }

        .calendar-bar.start-day.end-day {
            border-top-left-radius: 4px;
            border-bottom-left-radius: 4px;
            clip-path: polygon(0% 0%, calc(100% - 8px) 0%, 100% 50%, calc(100% - 8px) 100%, 0% 100%);
        }

        .calendar-bar.moved {
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .calendar-bar.last-day {
            box-shadow: 0 0 0 2px #ef4444;
            z-index: 6;
        }

        .calendar-day.holiday {
            background: #fef3c7;
        }

        .calendar-day.holiday .day-num {
            color: #d97706;
        }

        .holiday-name {
            font-size: 0.55rem;
            color: #d97706;
            font-weight: 700;
            line-height: 1;
            margin-top: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .calendar-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            background: white;
            z-index: 20;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .calendar-controls-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        #calendar-view {
            max-height: 70vh;
            overflow-y: auto;
            padding-right: 8px;
        }

        /* Product Selector Panel */
        .cal-product-panel {
            background: #f0f7ff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            display: none;
        }

        .cal-product-panel.show {

        function initFirebase() {
            if (firebaseConfig.apiKey === "AIzaSy...") {

                return;
            }
            try {
                firebase.initializeApp(firebaseConfig);
                db = firebase.database();
                isOnline = true;
                const statusEl = document.getElementById('sync-status');
                statusEl.textContent = "クラウド同期中";
                statusEl.classList.add('online');
                listenToCloud();
            } catch (e) {
                console.error("Firebase init failed:", e);
                document.getElementById('sync-status').textContent = "同期エラー";
            }
        }

        function syncToCloud() {
            if (!isOnline || !db) return;
            // ローカルの内容をクラウドに保存
            db.ref('mainState').set(state);
        }

        function listenToCloud() {
            if (!isOnline || !db) return;
            db.ref('mainState').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    // クラウドのデータでローカルを上書きする前に整合性をチェック
                    // Firebaseの「数字キーを持つオブジェクト」を配列に変換、または欠損を防ぐ
                    const newState = { ...state, ...data };

                    if (data.candidates && !Array.isArray(data.candidates)) {
                        newState.candidates = Object.values(data.candidates);
                    }
                    if (data.pourList && !Array.isArray(data.pourList)) {
                        newState.pourList = Object.values(data.pourList);
                    }
                    if (data.history && !Array.isArray(data.history)) {
                        newState.history = Object.values(data.history);
                    }
                    if (data.calendarProducts && !Array.isArray(data.calendarProducts)) {
                        newState.calendarProducts = Object.values(data.calendarProducts);
                    }

                    state = newState;
                    updateUI();
                    if (state.lastProcessedDate) updateDateDisplay();
                    console.log("Cloud data synced successfully.");
                }
            });
        }

        const STORAGE_KEY = 'concrete_app_state';

        function saveState() {
            const dataToSave = {
                candidates: state.candidates,
                pourList: state.pourList,
                quota: state.quota,
                history: state.history,

                calendarStartDates: state.calendarStartDates,
                calendarProducts: state.calendarProducts,
                sortMode: state.sortMode,
                isSortingMode: state.isSortingMode
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(dataToSave));
            syncToCloud();
        }

        // --- Calendar Forecast ---
        // --- Japanese Holidays ---
        function getJapaneseHolidays(year) {
            const holidays = {};
            const add = (m, d, name) => {
                const key = `${year}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                holidays[key] = name;
            };
            // Fixed holidays
            add(1, 1, '元日');
            add(2, 11, '建国記念の日');
            add(2, 23, '天皇誕生日');
            add(4, 29, '昭和の日');
            add(5, 3, '憲法記念日');
            add(5, 4, 'みどりの日');
            add(5, 5, 'こどもの日');
            add(8, 11, '山の日');
            add(11, 3, '文化の日');
            add(11, 23, '勤労感謝の日');

            // Nth Monday holidays
            function nthMonday(m, n) {
                let count = 0;
                for (let d = 1; d <= 31; d++) {
                    const dt = new Date(year, m - 1, d);
                    if (dt.getMonth() !== m - 1) break;
                    if (dt.getDay() === 1) count++;
                    if (count === n) return d;
                }
                return 1;
            }
            add(1, nthMonday(1, 2), '成人の日');
            add(7, nthMonday(7, 3), '海の日');
            add(9, nthMonday(9, 3), '敬老の日');
            add(10, nthMonday(10, 2), 'スポーツの日');

            // Equinoxes (approximate)
            if (year === 2026) {
                add(3, 20, '春分の日');
                add(9, 23, '秋分の日');
            } else if (year === 2027) {
                add(3, 21, '春分の日');
                add(9, 23, '秋分の日');
            } else {
                // Approximate for other years
                add(3, 20, '春分の日');
                add(9, 23, '秋分の日');
            }

            // Substitute holidays (振替休日): if a holiday falls on Sunday, next Monday is a day off
            const keys = Object.keys(holidays);
            keys.forEach(key => {
                const dt = new Date(parseInt(key.substr(0, 4)), parseInt(key.substr(5, 2)) - 1, parseInt(key.substr(8, 2)));
                if (dt.getDay() === 0) { // Sunday
                    const next = new Date(dt);
                    next.setDate(next.getDate() + 1);
                    const nextKey = `${next.getFullYear()}-${String(next.getMonth() + 1).padStart(2, '0')}-${String(next.getDate()).padStart(2, '0')}`;
                    if (!holidays[nextKey]) {
                        holidays[nextKey] = '振替休日';
                    }
                }
            });

            // National holiday (国民の休日): if a weekday is sandwiched between two holidays
            const sortedKeys = Object.keys(holidays).sort();
            for (let i = 0; i < sortedKeys.length - 1; i++) {
                const d1 = new Date(parseInt(sortedKeys[i].substr(0, 4)), parseInt(sortedKeys[i].substr(5, 2)) - 1, parseInt(sortedKeys[i].substr(8, 2)));
                const d2 = new Date(d1);
                d2.setDate(d2.getDate() + 2);
                const d2Key = `${d2.getFullYear()}-${String(d2.getMonth() + 1).padStart(2, '0')}-${String(d2.getDate()).padStart(2, '0')}`;
                if (holidays[d2Key]) {
                    const mid = new Date(d1);
                    mid.setDate(mid.getDate() + 1);
                    const midKey = `${mid.getFullYear()}-${String(mid.getMonth() + 1).padStart(2, '0')}-${String(mid.getDate()).padStart(2, '0')}`;
                    if (!holidays[midKey] && mid.getDay() !== 0 && mid.getDay() !== 6) {
                        holidays[midKey] = '国民の休日';
                    }
                }
            }

            // 2026 specific: May 6 substitute (Constitution Day on Sunday)
            if (year === 2026) {
                const may6Key = `2026-05-06`;
                if (!holidays[may6Key]) holidays[may6Key] = '振替休日';
                // Sep 22 national holiday (between Respect for Aged and Autumnal Equinox)
                const sep22Key = `2026-09-22`;
                if (!holidays[sep22Key]) holidays[sep22Key] = '国民の休日';
            }

            return holidays;
        }

        // Build holiday lookup for a range of years
        let holidayCache = {};
        function getHolidayName(dateStr) {
            const year = parseInt(dateStr.substr(0, 4));
            if (!holidayCache[year]) {
                holidayCache[year] = getJapaneseHolidays(year);
            }
            return holidayCache[year][dateStr] || null;
        }

        function getCalendarProductInfo(productId) {
            // 鉄筋追跡が有効な製品のみをID順に並べて番号を振る
            const trackable = state.candidates
                .filter(c => c.trackingEnabled)
                .sort((a, b) => a.id - b.id);
            const idx = trackable.findIndex(c => c.id === productId);

            const colors = ['#4f46e5', '#10b981', '#f59e0b', '#ef4444', '#ec4899', '#8b5cf6', '#06b6d4', '#f97316', '#a855f7', '#14b8a6'];
            if (idx === -1) return { number: '?', color: '#94a3b8' };

            return {
                number: idx + 1,
                color: colors[idx % colors.length]
            };
        }

        function renderCalendar() {
            try {
                const container = elements.calendarView;
                if (!container) return;
                container.innerHTML = '';

                // Helper: format date as YYYY-MM-DD using LOCAL time (not UTC)
                function formatLocalDate(d) {
                    const y = d.getFullYear();
                    const m = String(d.getMonth() + 1).padStart(2, '0');
                    const dd = String(d.getDate()).padStart(2, '0');
                    return `${y}-${m}-${dd}`;
                }

                function isWeekendDay(d) {
                    return d.getDay() === 0 || d.getDay() === 6;
                }

                function isHolidayOrWeekend(d) {
                    if (isWeekendDay(d)) return true;
                    return !!getHolidayName(formatLocalDate(d));
                }

                function skipToWorkday(d) {
                    while (isHolidayOrWeekend(d)) {
                        d.setDate(d.getDate() + 1);
                    }
                    return d;
                }

                const startDate = new Date();
                startDate.setDate(1);

                // Loop for 12 months
                for (let mOffset = 0; mOffset < 12; mOffset++) {
                    const year = startDate.getFullYear();
                    const month = startDate.getMonth();

                    const monthWrapper = document.createElement('div');
                    monthWrapper.className = 'month-wrapper';

                    const title = document.createElement('h3');
                    title.className = 'month-header';
                    title.textContent = `${year}年 ${month + 1}月`;
                    monthWrapper.appendChild(title);

                    const grid = document.createElement('div');
                    grid.className = 'calendar-grid';

                    const dayNames = ['日', '月', '火', '水', '木', '金', '土'];
                    dayNames.forEach(d => {
                        const h = document.createElement('div');
                        h.className = 'calendar-header-day';
                        h.textContent = d;
                        grid.appendChild(h);
                    });

                    const firstDay = new Date(year, month, 1);
                    const lastDay = new Date(year, month + 1, 0);

                    for (let i = 0; i < firstDay.getDay(); i++) {
                        grid.appendChild(document.createElement('div'));
                    }

                    for (let d = 1; d <= lastDay.getDate(); d++) {
                        const date = new Date(year, month, d);
                        const isWeekend = isWeekendDay(date);
                        const dateStr = formatLocalDate(date);
                        const holidayName = getHolidayName(dateStr);
                        const cell = document.createElement('div');
                        cell.className = `calendar-day${isWeekend ? ' weekend' : ''}${holidayName ? ' holiday' : ''}`;
                        cell.innerHTML = `<span class="day-num">${d}</span>${holidayName ? `<div class="holiday-name">${holidayName}</div>` : ''}`;
                        cell.dataset.date = dateStr;

                        // Click cell to set start date for all calendar products
                        cell.onclick = (e) => {
                            let selDate = new Date(year, month, d);
                            skipToWorkday(selDate);
                            const targetDateStr = formatLocalDate(selDate);
                            // Set start date for calendarProducts
                            state.calendarProducts.forEach(pid => {
                                state.calendarStartDates[pid] = targetDateStr;
                            });
                            // Also set for pourList tracked items
                            state.pourList.filter(p => p.trackingEnabled).forEach(p => {
                                state.calendarStartDates[p.originalId] = targetDateStr;
                            });
                            saveState();
                            renderCalendar();
                        };

                        grid.appendChild(cell);
                    }
                    monthWrapper.appendChild(grid);
                    container.appendChild(monthWrapper);

                    startDate.setMonth(startDate.getMonth() + 1);
                }

                // Build list of products to forecast
                const forecastItems = [];

                // From pourList (existing behavior)
                state.pourList.forEach(p => {
                    if (!p.trackingEnabled) return;
                    const target = state.candidates.find(c => c.id === p.originalId);
                    if (!target) return;
                    forecastItems.push({
                        id: p.originalId,
                        name: p.name,
                        rebar: target.rebar,
                        stock: target.stock,
                        count: p.count
                    });
                });

                // From calendarProducts (new)
                state.calendarProducts.forEach(pid => {
                    // Don't duplicate if already in pourList
                    if (forecastItems.some(f => f.id === pid)) return;
                    const target = state.candidates.find(c => c.id === pid);
                    if (!target || !target.trackingEnabled) return;
                    forecastItems.push({
                        id: target.id,
                        name: target.name,
                        rebar: target.rebar,
                        stock: target.stock,
                        count: target.count || 1
                    });
                });

                // Forecast Logic
                forecastItems.forEach(p => {
                    const info = getCalendarProductInfo(p.id);
                    const startDateStr = state.calendarStartDates[p.id] || formatLocalDate(new Date());
                    let currentPos = new Date(
                        parseInt(startDateStr.split('-')[0]),
                        parseInt(startDateStr.split('-')[1]) - 1,
                        parseInt(startDateStr.split('-')[2])
                    );

                    // Skip to first workday (not weekend, not holiday)
                    skipToWorkday(currentPos);

                    const dailyUsage = p.rebar * p.count;
                    if (dailyUsage <= 0) return;

                    let rebarLeft = p.stock;
                    let dayCount = 0;
                    let isStart = true;

                    while (rebarLeft >= dailyUsage && dayCount < 180) {
                        skipToWorkday(currentPos);

                        const dateStr = formatLocalDate(currentPos);
                        const cells = container.querySelectorAll(`[data-date="${dateStr}"]`);

                        const isLast = (rebarLeft - dailyUsage) < dailyUsage;

                        if (cells.length > 0) {
                            const bar = document.createElement('div');
                            bar.className = 'calendar-bar';
                            bar.style.backgroundColor = info.color;
                            if (isStart) bar.classList.add('start-day');
                            if (isLast) bar.classList.add('end-day');
                            if (state.calendarStartDates[p.id]) bar.classList.add('moved');
                            if (isLast) bar.classList.add('last-day');

                            bar.title = `${p.name}\n在庫残: ${rebarLeft}本`;
                            bar.textContent = info.number;
                            cells[0].appendChild(bar);
                        }

                        rebarLeft -= dailyUsage;
                        dayCount++;
                        isStart = false;

                        currentPos.setDate(currentPos.getDate() + 1);
                        skipToWorkday(currentPos);
                    }
                });
            } catch (e) {
                console.error("renderCalendar crashed:", e);
            }
        }

        function saveProduct() {
            const data = {
                name: elements.editName.value || "無名製品",
                rebar: parseInt(elements.editRebar.value) || 0,
                weight: parseInt(elements.editWeight.value) || 0,
                stock: parseInt(elements.editStock.value) || 0,
                priority: elements.editPriority.value,
                trackingEnabled: elements.editTracking.checked
            };
            if (state.editingId) {
                const index = state.candidates.findIndex(p => Number(p.id) === Number(state.editingId));
                if (index !== -1) state.candidates[index] = { ...state.candidates[index], ...data };
            } else {
                state.candidates.push({ id: Date.now(), ...data, count: 1 });
            }
            elements.editModal.classList.add('hidden');
            saveState();
            updateUI();
        }

        function deleteProduct(productId) {
            console.log("Delete product requested for ID:", productId);
            const p = state.candidates.find(c => Number(c.id) === Number(productId));
            const pName = p ? p.name : "この製品";
            const confirmMessage = `「${pName}」をマスターデータから完全に削除しますか？\nこの操作は元に戻せません。打設リストやカレンダーからも消去されます。`;

            // Native confirm blocks the main thread
            if (window.confirm(confirmMessage)) {
                const idToDelete = Number(productId);
                console.log("Confirmed deletion for ID:", idToDelete);

                // 候補リストから削除
                state.candidates = state.candidates.filter(p => Number(p.id) !== idToDelete);

                // 打設リストからも削除（整合性確保）
                state.pourList = state.pourList.filter(p => Number(p.originalId) !== idToDelete);

                // カレンダー設定からも削除
                state.calendarProducts = state.calendarProducts.filter(id => Number(id) !== idToDelete);
                if (state.calendarStartDates[idToDelete]) {
                    delete state.calendarStartDates[idToDelete];
                }

                saveState();
                updateUI();
                if (elements.calendarModal && !elements.calendarModal.classList.contains('hidden')) {
                    renderCalendar();
                }
            } else {
                console.log("Deletion cancelled.");
            }
        }

        function moveToPour(productId) {
            const p = state.candidates.find(p => p.id === productId);
            if (!p) return;
            if (p.rebar > p.stock) { showAlert(`「${p.name}」の鉄筋在庫が不足しています！`); return; }
            state.pourList.push({ ...p, id: Date.now() + Math.random(), originalId: p.id, count: 1 });
            saveState();
            updateUI();
        }

        function moveToCandidate(uniqueId) {
            const index = state.pourList.findIndex(p => p.id === uniqueId);
            if (index === -1) return;
            state.pourList.splice(index, 1);
            saveState();
            updateUI();
        }

        function updateQuantity(productId, delta) {
            const p = state.pourList.find(item => item.id === productId);
            if (!p) return;
            const next = p.count + delta;
            if (next < 1) return;
            if (delta > 0 && (next * p.rebar) > p.stock) { showAlert(`「${p.name}」の鉄筋在庫が不足しています！`); return; }
            p.count = next;
            saveState();
            updateUI();
        }

        function toggleExpand(sectionId) {
            const current = state.expandedSection;
            const otherId = sectionId === 'pour-section' ? 'candidate-section' : 'pour-section';
            const section = document.getElementById(sectionId);
            const other = document.getElementById(otherId);
            const btn = section.querySelector('.expand-toggle');

            if (current === sectionId) {
                state.expandedSection = null;
                section.classList.remove('expanded');
                other.classList.remove('shrunk');
                btn.classList.remove('active');
                btn.querySelector('.icon-expand').textContent = '🗖';
            } else {
                state.expandedSection = sectionId;
                section.classList.add('expanded');
                section.classList.remove('shrunk');
                other.classList.add('shrunk');
                other.classList.remove('expanded');
                document.querySelectorAll('.expand-toggle').forEach(b => {
                    b.classList.remove('active');
                    b.querySelector('.icon-expand').textContent = '🗖';
                });
                btn.classList.add('active');
                btn.querySelector('.icon-expand').textContent = '🗗';
            }
        }

        function showAlert(msg) {
            elements.alertMessage.textContent = msg;
            elements.alertOverlay.classList.remove('hidden');
            setTimeout(() => elements.alertOverlay.classList.add('hidden'), 2500);
        }

        function checkDailyConsumption() {
            const now = new Date();
            const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;

            if (state.lastProcessedDate && state.lastProcessedDate !== todayStr) {
                if (state.pourList.length > 0) {
                    const totalWeight = state.pourList.reduce((sum, p) => sum + (p.weight * p.count), 0);
                    const totalCount = state.pourList.reduce((sum, p) => sum + p.count, 0);

                    state.history.push({
                        date: state.lastProcessedDate,
                        totalWeight: totalWeight,
                        totalCount: totalCount,
                        details: state.pourList.map(p => ({ name: p.name, count: p.count }))
                    });

                    // Update stocks
                    state.pourList.forEach(item => {
                        const target = state.candidates.find(c => c.id === item.originalId);
                        if (target && target.trackingEnabled) {
                            target.stock -= (target.rebar * item.count);
                        }
                    });

                    showAlert(`日付が変わりました（${todayStr}）。\n実績を記録し、鉄筋在庫を更新しました。`);
                }
            }
            state.lastProcessedDate = todayStr;
            updateDateDisplay();
            saveState();
        }

        function updateUI() {
            try {
                if (!Array.isArray(state.candidates)) {
                    console.warn("state.candidates is not an array. Resetting to empty.");
                    state.candidates = [];
                }

                let filteredCandidates = state.candidates.filter(p =>
                    p && p.name && p.name.toLowerCase().includes(state.searchQuery || "")
                );

                // Apply candidate list sorting
                if (state.sortMode === 'weight') {
                    filteredCandidates.sort((a, b) => b.weight - a.weight);
                } else if (state.sortMode === 'priority') {
                    const pRank = { '高': 3, '中': 2, '低': 1 };
                    filteredCandidates.sort((a, b) => (pRank[b.priority] || 0) - (pRank[a.priority] || 0));
                }
                // 'default' uses the state.candidates order

                renderList('candidate', filteredCandidates);

                // Sort pourList based on the order in the master candidate list
                const sortedPourList = [...state.pourList].sort((a, b) => {
                    const indexA = state.candidates.findIndex(c => Number(c.id) === Number(a.originalId));
                    const indexB = state.candidates.findIndex(c => Number(c.id) === Number(b.originalId));
                    return (indexA === -1 ? 9999 : indexA) - (indexB === -1 ? 9999 : indexB);
                });

                renderList('pour', sortedPourList);
                const total = state.pourList.reduce((sum, p) => sum + (p.weight * p.count), 0);
                elements.totalWeight.textContent = total.toLocaleString();
                elements.goalDisplay.textContent = state.quota.toLocaleString();

                const statsTotal = document.getElementById('stats-total-weight');
                const statsAvg = document.getElementById('stats-avg-weight');
                if (statsTotal) statsTotal.textContent = total.toLocaleString() + "kg";
                if (statsAvg) {
                    const historyDays = state.history ? state.history.length : 0;
                    const avg = historyDays > 0 ? Math.round(state.history.reduce((s, h) => s + h.weight, 0) / historyDays) : 0;
                    statsAvg.textContent = `${avg.toLocaleString()}kg`;
                }

                elements.candidateCount = document.getElementById('candidate-count');
                elements.pourCountNum = document.getElementById('pour-count');

                if (elements.candidateCount) elements.candidateCount.textContent = filteredCandidates.length;
                if (elements.pourCountNum) elements.pourCountNum.textContent = state.pourList.reduce((sum, p) => sum + p.count, 0);

                const per = Math.min((total / state.quota) * 100, 100);
                elements.quotaGauge.style.width = `${per}%`;
                elements.quotaGauge.className = 'gauge-fill' + (total >= state.quota ? ' goal-reached' : '');
            } catch (e) {
                console.error("updateUI crashed:", e);
            }
        }

        function renderList(type, list) {
            const container = (type === 'candidate') ? elements.candidateList : elements.pourList;
            if (list.length === 0) {
                container.innerHTML = `<div class="empty-state">${type === 'candidate' ? '製品データを取り込んでください' : '候補リストから追加してください'}</div>`;
                return;
            }
            container.innerHTML = '';
            list.forEach(p => {
                const card = document.createElement('div');
                const pri = p.priority || '中';
                const pClass = `priority-${pri === '高' ? 'high' : pri === '中' ? 'medium' : 'low'}`;

                card.className = `product-card`;

                if (type === 'candidate') {
                    const isAdded = state.pourList.some(item => item.originalId === p.id);
                    if (isAdded) card.classList.add('added');

                    card.onclick = (e) => {
                        // Prevent triggering card click if an action button was clicked
                        if (e.target.closest('.action-icon') || e.target.closest('button')) return;
                        moveToPour(p.id);
                    };
                    const feedback = isAdded ? '<span class="added-badge">✅ 追加済み</span>' : '';
                    const lowStockAlert = (p.trackingEnabled && p.stock <= 1) ? `<div class="stock-warning">鉄筋残数が残りわずかです</div>` : '';

                    card.innerHTML = `
                        <div class="card-main">
                            <div class="product-name">
                                <span class="priority-tag ${pClass}">${pri}</span>
                                ${p.name} ${feedback}
                            </div>
                            <div class="card-meta">
                                ${p.trackingEnabled ? `<span class="stock-tag">鉄筋在庫: ${p.stock}本</span>` : ''}
                                ${lowStockAlert}
                            </div>
                            <div class="card-actions">
                                ${state.isSortingMode && state.sortMode === 'default' ? `
                                    <button class="action-icon" style="background:#fef3c7; border:1px solid #fcd34d;" onclick="event.stopPropagation(); moveCandidate(${p.id}, -1)">🔼</button>
                                    <button class="action-icon" style="background:#fef3c7; border:1px solid #fcd34d;" onclick="event.stopPropagation(); moveCandidate(${p.id}, 1)">🔽</button>
                                ` : ''}
                                <button class="action-icon" onclick="event.stopPropagation(); openEditModal(${p.id})">編集</button>
                                <button class="action-icon delete" onclick="event.stopPropagation(); deleteProduct(${p.id})">削除</button>
                            </div>
                        </div>
                        <div class="card-side"><div class="product-weight">${p.weight.toLocaleString()}kg</div></div>
                    `;
                } else {
                    const trackingHtml = p.trackingEnabled ? (() => {
                        const rem = p.stock - (p.rebar * p.count);
                        const sClass = rem < 0 ? 'danger' : rem <= (p.rebar * 2) ? 'low' : '';
                        const lowStockAlert = p.stock <= 1 ? `<div class="stock-warning">鉄筋残数が残りわずかです</div>` : '';
                        return `
                            <div class="card-meta">
                                <span class="stock-tag ${sClass}">鉄筋残数: ${rem}本</span>
                                ${lowStockAlert}
                            </div>`;
                    })() : '';

                    card.innerHTML = `
                        <div class="card-main">
                            <div class="product-name">
                                <span class="priority-tag ${pClass}">${pri}</span>
                                ${p.name}
                            </div>
                            ${trackingHtml}
                        </div>
                        <div class="card-side">
                            <div class="product-weight">${(p.weight * p.count).toLocaleString()}kg</div>
                            <div class="quantity-controls">
                                <button class="qty-btn" onclick="updateQuantity(${p.id}, -1)">-</button>
                                <span class="qty-val">✖️${p.count}</span>
                                <button class="qty-btn" onclick="updateQuantity(${p.id}, 1)">+</button>
                            </div>
                            <button class="btn-return" onclick="moveToCandidate(${p.id})">候補に戻す</button>
                        </div>
                    `;
                }
                container.appendChild(card);
            });
        }

        function moveCandidate(productId, direction) {
            const idx = state.candidates.findIndex(c => Number(c.id) === Number(productId));
            if (idx === -1) return;

            const newIdx = idx + direction;
            if (newIdx < 0 || newIdx >= state.candidates.length) return;

            // Swap
            const temp = state.candidates[idx];
            state.candidates[idx] = state.candidates[newIdx];
            state.candidates[newIdx] = temp;

            saveState();
            updateUI();
        }

        window.moveCandidate = moveCandidate;
        window.updateQuantity = updateQuantity;
        window.moveToCandidate = moveToCandidate;
        window.openEditModal = openEditModal;
        window.deleteProduct = deleteProduct;
        window.toggleExpand = toggleExpand;
        window.openCalendar = openCalendar;
        window.toggleCalendarProduct = toggleCalendarProduct;

        // --- Initialization ---
        checkAuth();
        initFirebase();
        init();
    </script>
</body>

</html>
